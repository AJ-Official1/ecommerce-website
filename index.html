<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyStore | Your Python Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="amazon-dark">

    <!-- Amazon Dark Navigation Bar Header -->
    <header class="amazon-header">
        <div class="header-logo">PyStore<span>.com</span></div>
        <div class="header-search">
            <input type="text" id="searchInput" placeholder="Search premium Python scripts...">
            <button class="search-icon-btn">&#128269;</button>
        </div>
        <div class="header-right-text">Script Manager</div>
    </header>

    <!-- Main Content Container Grid -->
    <main class="main-container">
        <h2 class="section-heading">Featured Python Files</h2>
        
        <!-- The Full-Width Amazon Product Card Grid Layout -->
        <div class="products-display-grid" id="catalog-grid">
            <!-- JavaScript dynamically loads cards here -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
